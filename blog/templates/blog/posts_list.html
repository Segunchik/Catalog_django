{% extends 'blog/base.html' %}
{% load my_tags %}
{% block content %}
<div style="display: flex; justify-content: flex-end;">
    <a href="{% url 'blog:posts_create' %}">
        <button
            type="button"
            class="btn btn-sm btn-outline-secondary"
        >
            Создать пост
        </button>
    </a>
</div>
      <div class="album py-5 bg-body-tertiary">
        <div class="container">
          <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
            {% for post in object_list %}
            <div class="col">
              <div class="card shadow-sm">
                  <img src="{{ post.image | media_filter }}" height="200">
                  <title>Placeholder</title>
                  <rect width="100%" height="100%" fill="#55595c"></rect>
                  <text x="50%" y="50%" fill="#eceeef" dy=".3em">
                  </text>

                <div class="card-body">
                  <p class="card-text">
                      {{ post.title }}
                  </p>
                    <h6>Пост создан: {{ post.created_at }}</h6>
                  <div
                    class="d-flex justify-content-between align-items-center"
                  >
                    <div class="btn-group">
                        <a href="{% url 'blog:post_detail' post.pk %}">
                          <button
                            type="button"
                            class="btn btn-sm btn-outline-secondary"
                          >
                                Смотреть
                          </button>
                        </a>
                        <a href="{% url 'blog:post_update' post.pk %}">
                          <button
                            type="button"
                            class="btn btn-sm btn-outline-secondary"
                          >
                            Редактировать
                          </button>
                        </a>
                        <a href="{% url 'blog:post_confirm_delete' post.pk %}">
                          <button
                            type="button"
                            class="btn btn-sm btn-outline-secondary"
                          >
                            Удалить
                          </button>
                        </a>
                    </div>

                    <small class="text-body-secondary">Просмотров: {{ post.count_views }}</small>
                  </div>
                </div>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>
      </div>
{% endblock %}

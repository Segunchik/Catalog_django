{% extends 'catalog/base.html' %}

{% block title %}Вы вышли из системы{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Успешный выход</h3>
                </div>
                <div class="card-body text-center">
                    <i class="bi bi-box-arrow-right text-muted" style="font-size: 4rem;"></i>
            <h4 class="mt-3">До новых встреч!</h4>
            <p class="text-muted">Вы успешно вышли из своей учётной записи.</p>

            <div class="mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary">Войти снова</a>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">На главную</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
